{% extends 'minearts_app/base.html' %}
{% load static %}

{% block extra_css %}
        <link rel="stylesheet" href="{% static 'minearts_app/css/login.css' %}">
{% endblock %}

{% block content %}
    <main class="login-container">

        <!-- LOGO -->
        <img 
            src="{% static 'minearts_app/img/Mineart.s Logo.svg' %}"
            class="logo"
            alt="Logo"
        >

        <h1>Entrar</h1>

        <p>Acesse sua conta ou crie uma nova.</p>

        <form>

            <!-- EMAIL -->
            <label>E-mail ou Usuário</label>

            <div class="input-box">

                <img 
                    src="{% static 'minearts_app/img/icon/user-icon.png' %}"
                    class="icon"
                    alt="Usuário"
                >

                <input 
                    type="text"
                    placeholder="exemplo@gmail.com"
                >

            </div>

            <!-- SENHA -->
            <label>Senha</label>

            <div class="input-box">

                <img 
                    src="{% static 'minearts_app/img/icon/lock-icon.png' %}"
                    class="icon"
                    alt="Senha"
                >

                <input 
                    type="password"
                    placeholder="12345"
                >

            </div>

            <!-- BOTÃO -->
            <button type="submit">
                Entrar
            </button>

        </form>

        <!-- LINKS -->
        <div class="links">

            <a href="#">
                Esqueceu a senha?
            </a>

            <a href="#">
                Não tem conta?
                <strong>Cadastre-se</strong>
            </a>

        </div>

    </main>
{% endblock %}

{% block footer %}{% endblock %}
